# ─────────────────────────────────────────────────────────────────
# GitHub Actions — CI Workflow
# Runs on every PR: lint, test, terraform validate
# ─────────────────────────────────────────────────────────────────
name: CI

on:
  pull_request:
    branches: [master, develop]
  push:
    branches: [develop]

jobs:
  # ── Frontend lint & build ─────────────────────────────────────
  frontend:
    name: Frontend — Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Build (with dummy env vars)
        run: |
          echo "VITE_COGNITO_USER_POOL_ID=us-east-1_test" >> .env
          echo "VITE_COGNITO_CLIENT_ID=test123" >> .env
          echo "VITE_API_URL=https://test.execute-api.us-east-1.amazonaws.com" >> .env
          echo "VITE_VAPID_PUBLIC_KEY=test" >> .env
          npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

  # ── Backend lint ──────────────────────────────────────────────
  backend:
    name: Backend — Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - run: npm ci

      - name: Check for syntax errors
        run: |
          find lambdas -name "*.mjs" | while read f; do
            node --check "$f" && echo "✓ $f" || exit 1
          done

  # ── Terraform validate ────────────────────────────────────────
  terraform-validate:
    name: Terraform — Validate (dev)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform/environments/dev

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.8.0'

      - name: terraform fmt check
        run: terraform fmt -check -recursive ../../..

      - name: terraform init (no backend)
        run: terraform init -backend=false

      - name: terraform validate
        run: terraform validate
